services:
  kafka:
    image: bitnamilegacy/kafka:3.8.0
    container_name: kafka-broker
    restart: unless-stopped
    ports:
      - "39092:9092"
    environment:
      KAFKA_ENABLE_KRAFT: "yes"
      KAFKA_CFG_PROCESS_ROLES: broker,controller
      KAFKA_CFG_NODE_ID: 1
      KAFKA_KRAFT_CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 1@kafka:29093
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_LISTENERS: INTERNAL://:29092,CONTROLLER://:29093,EXTERNAL://:9092
      KAFKA_CFG_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://localhost:39092
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CFG_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_CFG_NUM_PARTITIONS: 12
      KAFKA_CFG_DEFAULT_REPLICATION_FACTOR: 1
      KAFKA_CFG_MIN_INSYNC_REPLICAS: 1
      KAFKA_CFG_OFFSETS_TOPIC_NUM_PARTITIONS: 12
      KAFKA_CFG_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_CFG_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_CFG_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_CFG_NUM_NETWORK_THREADS: 4
      KAFKA_CFG_NUM_IO_THREADS: 16
      KAFKA_CFG_BACKGROUND_THREADS: 8
      KAFKA_CFG_NUM_RECOVERY_THREADS_PER_DATA_DIR: 8
      KAFKA_CFG_QUEUED_MAX_REQUESTS: 1000
      KAFKA_CFG_SOCKET_SEND_BUFFER_BYTES: 1048576
      KAFKA_CFG_SOCKET_RECEIVE_BUFFER_BYTES: 1048576
      KAFKA_CFG_SOCKET_REQUEST_MAX_BYTES: 104857600
      KAFKA_CFG_MESSAGE_MAX_BYTES: 2097152
      KAFKA_CFG_REPLICA_FETCH_MAX_BYTES: 4194304
      KAFKA_CFG_LOG_SEGMENT_BYTES: 1073741824
      KAFKA_HEAP_OPTS: -Xms1g -Xmx1g
      ALLOW_PLAINTEXT_LISTENER: "yes"
    volumes:
      - kafka_data:/bitnami/kafka
    networks:
      - kafka_net
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "timeout 5 bash -lc 'echo > /dev/tcp/127.0.0.1/9092'"
        ]
      interval: 10s
      start_period: 20s
      timeout: 10s
      retries: 12

  kafka-init:
    image: bitnamilegacy/kafka:3.8.0
    container_name: kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    restart: "no"
    entrypoint: ["/bin/sh", "/scripts/create-topics.sh"]
    volumes:
      - ./docker/kafka/create-topics.sh:/scripts/create-topics.sh:ro
    networks:
      - kafka_net

  timescaledb:
    image: timescale/timescaledb:2.25.2-pg16
    container_name: timescaledb
    restart: unless-stopped
    ports:
      - "55432:5432"
    environment:
      POSTGRES_DB: iot
      POSTGRES_USER: iot_user
      POSTGRES_PASSWORD: iot_password
    command:
      [
        "postgres",
        "-c",
        "shared_buffers=512MB",
        "-c",
        "effective_cache_size=1536MB",
        "-c",
        "max_connections=200",
        "-c",
        "checkpoint_completion_target=0.9",
        "-c",
        "wal_compression=on",
        "-c",
        "timescaledb.max_background_workers=8"
      ]
    volumes:
      - timescaledb_data:/var/lib/postgresql/data
      - ./docker/timescaledb/init:/docker-entrypoint-initdb.d:ro
    networks:
      - timescaledb_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U iot_user -d iot"]
      interval: 10s
      timeout: 5s
      retries: 12

volumes:
  kafka_data:
  timescaledb_data:

networks:
  kafka_net:
  timescaledb_net:
